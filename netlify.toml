[build]
  command = "node inject-env.js"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
  SECRETS_SCAN_OMIT_KEYS = "ANTHROPIC_API_KEY,RESEND_API_KEY,FYGARO_API_KEY,FYGARO_SECRET_KEY,FYGARO_PUBLIC_KEY,GOOGLE_PLACES_API_KEY,GOOGLE_SERVICE_ACCOUNT,GOOGLE_SHEET_ID,FYGARO_BUTTON_URL,FIREBASE_API_KEY,GOOGLE_MAPS_API_KEY"

[functions]
