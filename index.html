<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Najah Chemist Wholesale</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Najah Chemist Wholesale Order</h2>

  <label>Customer Name</label>
  <input type="text" id="customerName">

  <label>Phone Number</label>
  <input type="text" id="phone">

  <label>Delivery Location</label>
  <input type="text" id="deliveryLocation">

  <label>Product</label>
  <select id="product">
    <option value="Yoni Oil - Liter - 5000">Yoni Oil - Liter - JMD 5000</option>
    <option value="Lightening Cream - Liter - 7000">Lightening Cream - Liter - JMD 7000</option>
  </select>

  <label>Delivery Area</label>
  <select id="deliveryArea">
    <option value="Kingston" data-fee="1000">Kingston - JMD 1000</option>
    <option value="Other Parish" data-fee="2000">Other Parish - JMD 2000</option>
  </select>

  <button onclick="checkout()">Checkout via WhatsApp</button>
</div>

<script>
async function checkout() {

  const customerName = document.getElementById("customerName").value;
  const phone = document.getElementById("phone").value;
  const deliveryLocation = document.getElementById("deliveryLocation").value;
  const product = document.getElementById("product").value;

  const deliverySelect = document.getElementById("deliveryArea");
  const deliveryArea = deliverySelect.value;
  const deliveryFee = parseInt(deliverySelect.options[deliverySelect.selectedIndex].dataset.fee);

  if (!customerName || !phone || !deliveryLocation) {
    alert("Please complete all customer details.");
    return;
  }

  const productPrice = parseInt(product.split("-")[2]);
  const total = productPrice + deliveryFee;

  const orderData = {
    orderId: "ORD-" + Date.now(),
    date: new Date().toISOString(),
    customerName: customerName,
    phone: phone,
    products: product,
    deliveryLocation: deliveryArea + " - " + deliveryLocation,
    deliveryFee: deliveryFee,
    total: total,
    status: "New"
  };

  try {

    await fetch("/.netlify/functions/create-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(orderData)
    });

    const message =
`Najah Chemist Wholesale Order
Customer: ${customerName}
Phone: ${phone}
Product: ${product}
Delivery: ${deliveryArea}
Address: ${deliveryLocation}
Total: JMD ${total}`;

    const url = "https://api.whatsapp.com/send?phone=18768510998&text=" + encodeURIComponent(message);

    window.open(url, "_blank");

  } catch (error) {
    alert("Error processing order.");
    console.error(error);
  }
}
</script>

</body>
</html>
