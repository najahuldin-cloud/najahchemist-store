<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Najah Chemist Wholesale</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:30px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

button{
margin-top:25px;
width:100%;
padding:15px;
background:black;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#333;
}
</style>

</head>

<body>

<div class="container">

<h1>Najah Chemist Wholesale Order</h1>

<label>Customer Name</label>
<input id="customerName" type="text">

<label>Phone Number</label>
<input id="phone" type="text">

<label>Delivery Location</label>
<input id="location" type="text">

<label>Product</label>
<select id="product">
<option value="Yoni Oil - Liter - 5000">Yoni Oil - Liter - JMD 5000</option>
<option value="Yoni Oil - Gallon - 18000">Yoni Oil - Gallon - JMD 18000</option>
</select>

<label>Delivery Area</label>
<select id="deliveryArea">
<option value="Kingston - 1000">Kingston - JMD 1000</option>
<option value="St Catherine - 1500">St Catherine - JMD 1500</option>
<option value="Rural - 2000">Rural - JMD 2000</option>
</select>

<button onclick="submitOrder()">
Checkout via WhatsApp
</button>

</div>


<script>

async function submitOrder(){

const customerName = document.getElementById("customerName").value
const phone = document.getElementById("phone").value
const location = document.getElementById("location").value
const product = document.getElementById("product").value
const deliveryArea = document.getElementById("deliveryArea").value

const productPrice = parseInt(product.split(" - ").pop())
const deliveryFee = parseInt(deliveryArea.split(" - ").pop())

const total = productPrice + deliveryFee

const order = {
orderId: Date.now(),
date: new Date().toLocaleString(),
customerName,
phone,
products: product,
deliveryLocation: location,
deliveryFee,
total,
status: "NEW"
}

await fetch("/.netlify/functions/create-order",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(order)
})

const message =
`Najah Chemist Order

Name: ${customerName}
Phone: ${phone}
Product: ${product}
Delivery Location: ${location}
Delivery Fee: ${deliveryFee}
Total: JMD ${total}`

const whatsapp =
`https://wa.me/18765551234?text=${encodeURIComponent(message)}`

window.open(whatsapp,"_blank")

}

</script>

</body>
</html>
