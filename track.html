<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Your Order | Najah Chemist</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#0F0E0D;--off:#FAFAF8;--gold:#B45309;--gold-light:#FEF3C7;
  --border:#2D2B28;--text:#F5F2ED;--mid:#9CA3AF;--green:#16a34a;
  --white:#ffffff;
}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:#0F0E0D;color:var(--text);min-height:100vh;}
/* Nav */
nav{padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:0.6rem;text-decoration:none;color:var(--text);}
.nav-nc{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;}
.nav-name{font-size:0.85rem;font-weight:600;color:#9CA3AF;}
.nav-back{font-size:0.82rem;color:var(--mid);text-decoration:none;padding:0.4rem 0.85rem;border:1px solid var(--border);border-radius:8px;transition:border-color 0.2s;}
.nav-back:hover{border-color:#9CA3AF;color:var(--text);}
/* Hero */
.hero{padding:3.5rem 1.5rem 2rem;text-align:center;max-width:640px;margin:0 auto;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;margin-bottom:0.75rem;}
.hero p{color:var(--mid);font-size:0.95rem;line-height:1.65;}
/* Search box */
.search-box{max-width:520px;margin:2.5rem auto 0;padding:0 1rem;}
.search-inner{background:#1C1A18;border:1px solid #2D2B28;border-radius:16px;padding:1.75rem;}
.search-inner label{display:block;font-size:0.78rem;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.75rem;}
.search-row{display:flex;gap:0.6rem;}
.search-row input{flex:1;background:#0F0E0D;border:1.5px solid #2D2B28;border-radius:10px;padding:0.75rem 1rem;font-family:'Outfit',sans-serif;font-size:0.92rem;color:var(--text);outline:none;transition:border-color 0.2s;}
.search-row input:focus{border-color:var(--gold);}
.search-row input::placeholder{color:#4B5563;}
.search-btn{padding:0.75rem 1.3rem;background:var(--gold);color:white;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:background 0.2s;}
.search-btn:hover{background:#92400E;}
.search-btn:disabled{opacity:0.6;cursor:not-allowed;}
.search-hint{font-size:0.75rem;color:#4B5563;margin-top:0.65rem;text-align:center;}
/* Result */
#track-result{max-width:560px;margin:2rem auto;padding:0 1rem;display:none;}
.result-card{background:#1C1A18;border:1px solid #2D2B28;border-radius:16px;overflow:hidden;}
.result-header{background:#2D2B28;padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;}
.result-id{font-size:1rem;font-weight:700;}
.status-badge{padding:0.3rem 0.85rem;border-radius:20px;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;}
.badge-pending{background:#1F2937;color:#9CA3AF;}
.badge-processing{background:#1E3A5F;color:#60A5FA;}
.badge-shipped{background:#14532d;color:#86efac;}
.badge-complete{background:#052e16;color:#4ade80;}
.badge-cancelled{background:#450a0a;color:#f87171;}
.result-body{padding:1.5rem;}
/* Timeline */
.timeline{margin-bottom:1.5rem;}
.timeline-item{display:flex;gap:1rem;padding-bottom:1.25rem;position:relative;}
.timeline-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:24px;width:2px;height:calc(100% - 24px);background:#2D2B28;}
.tl-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.72rem;flex-shrink:0;margin-top:1px;}
.tl-done{background:#14532d;color:#4ade80;}
.tl-active{background:var(--gold);color:white;}
.tl-pending{background:#1C1A18;border:2px solid #2D2B28;color:#4B5563;}
.tl-body{}
.tl-label{font-size:0.88rem;font-weight:600;margin-bottom:0.15rem;}
.tl-sub{font-size:0.75rem;color:var(--mid);}
/* Tracking detail box */
.track-detail{background:#0F0E0D;border:1px solid #2D2B28;border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:1.5rem;}
.track-detail-title{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);margin-bottom:0.75rem;}
.track-row{display:flex;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid #1C1A18;font-size:0.82rem;}
.track-row:last-child{border-bottom:none;}
.track-row span:first-child{color:var(--mid);}
.track-row span:last-child{font-weight:600;color:var(--text);}
.track-number{font-size:1.1rem;font-weight:700;color:var(--gold);letter-spacing:0.05em;}
/* Order summary */
.order-summary{background:#0F0E0D;border:1px solid #2D2B28;border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:1.5rem;}
.order-summary-title{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--mid);margin-bottom:0.75rem;}
.product-line{font-size:0.82rem;padding:0.25rem 0;border-bottom:1px solid #1C1A18;color:#D1D5DB;}
.product-line:last-child{border-bottom:none;}
/* Courier link */
.courier-link{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:var(--gold);text-decoration:none;margin-top:0.35rem;}
.courier-link:hover{text-decoration:underline;}
/* WA button */
.wa-btn{display:flex;align-items:center;justify-content:center;gap:0.6rem;width:100%;padding:0.85rem;background:#16a34a;color:white;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;text-decoration:none;transition:background 0.2s;}
.wa-btn:hover{background:#15803d;}
/* Error/empty states */
.not-found{text-align:center;padding:2rem;color:var(--mid);}
.not-found h3{font-size:1rem;margin-bottom:0.5rem;color:var(--text);}
/* Footer */
footer{text-align:center;padding:2rem 1rem;border-top:1px solid #1C1A18;margin-top:3rem;font-size:0.75rem;color:#4B5563;}
footer a{color:#6B7280;text-decoration:none;}
footer a:hover{color:var(--mid);}
@media(max-width:520px){
  .search-row{flex-direction:column;}
  .result-header{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="https://najahchemistja.com">
    <span class="nav-nc">Nc</span>
    <span class="nav-name">Najah Chemist</span>
  </a>
  <a class="nav-back" href="https://najahchemistja.com">← Shop</a>
</nav>

<div class="hero">
  <p style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:0.75rem;">Order Status</p>
  <h1>Track Your Order</h1>
  <p>Enter your Order ID (e.g. NC-12345) or the WhatsApp number you ordered with.</p>
</div>

<div class="search-box">
  <div class="search-inner">
    <label for="track-input">Order ID or WhatsApp Number</label>
    <div class="search-row">
      <input id="track-input" type="text" placeholder="e.g. NC-12345 or 18761234567" onkeydown="if(event.key==='Enter')trackOrder()">
      <button class="search-btn" id="track-btn" onclick="trackOrder()">Track</button>
    </div>
    <p class="search-hint">Order IDs start with NC- and were sent to you via WhatsApp after ordering.</p>
  </div>
</div>

<div id="track-result"></div>

<footer>
  <p>© 2026 Najah Chemist · <a href="https://najahchemistja.com">najahchemistja.com</a></p>
  <p style="margin-top:0.4rem;"><a href="https://wa.me/18768851099">Questions? WhatsApp us</a></p>
</footer>

<!-- Firebase Firestore -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, where, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDYdt_0wJNcfGl2WbIKPiESdVcmc-cqZgM",
  authDomain: "najahchemistja.com",
  projectId: "najah-chemist",
  storageBucket: "najah-chemist.firebasestorage.app",
  messagingSenderId: "89819999556",
  appId: "1:89819999556:web:4e6eb5c0c881da5e763b11"
};

const app = initializeApp(firebaseConfig, 'track-page');
const db = getFirestore(app);

window._trackSearch = async function(val) {
  const v = val.trim();
  if (!v) return null;
  const col = collection(db, 'orders');
  // Try by order ID first
  try {
    const q1 = query(col, where('id', '==', v));
    const s1 = await getDocs(q1);
    if (!s1.empty) return { ...s1.docs[0].data(), _docId: s1.docs[0].id };
  } catch(e) {}
  // Try orderId field
  try {
    const q2 = query(col, where('orderId', '==', v));
    const s2 = await getDocs(q2);
    if (!s2.empty) return { ...s2.docs[0].data(), _docId: s2.docs[0].id };
  } catch(e) {}
  // Try WhatsApp number (strip non-digits)
  const digits = v.replace(/\D/g, '');
  if (digits.length >= 7) {
    try {
      const all = await getDocs(col);
      const match = all.docs.map(d=>({...d.data(),_docId:d.id})).find(o=>{
        const wa = (o.customerWhatsApp||o.phone||'').replace(/\D/g,'');
        return wa && wa.endsWith(digits.slice(-7));
      });
      if (match) return match;
    } catch(e) {}
  }
  return null;
};
</script>

<script>
const COURIER_LINKS = {
  'Knutsford Express': 'https://knutsfordexpress.com',
  'Zipmail': 'https://zipmailjamaica.com'
};

const STATUS_ORDER = ['Pending','Processing','Shipped','Complete'];

function statusBadgeClass(s){
  const m = {'Pending':'badge-pending','Processing':'badge-processing','Shipped':'badge-shipped','Complete':'badge-complete','Cancelled':'badge-cancelled'};
  return m[s]||'badge-pending';
}

function fmtDate(d){
  if(!d) return '';
  try{
    const dt = typeof d==='string' ? new Date(d) : (d.toDate ? d.toDate() : new Date(d));
    return dt.toLocaleDateString('en-JM',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  }catch(e){return String(d);}
}

function getStatusStep(status){
  const s = (status||'Pending');
  if(s==='Cancelled') return -1;
  return STATUS_ORDER.indexOf(s);
}

function renderResult(o){
  if(!o){
    document.getElementById('track-result').style.display='block';
    document.getElementById('track-result').innerHTML=`<div class="result-card"><div class="not-found"><h3>Order not found</h3><p>Check the Order ID or WhatsApp number and try again. Your Order ID was sent via WhatsApp when you placed the order (starts with NC-).</p></div></div>`;
    return;
  }
  const status = o.status||'Pending';
  const step = getStatusStep(status);
  const tracking = o.tracking||null;
  const orderId = o.id||o.orderId||'—';
  const client = o.client||o.customerName||'—';
  const product = o.product||o.products||'—';
  const total = o.total?'J$'+parseFloat(o.total).toLocaleString():'—';
  const payStatus = o.paymentStatus||o.payment||'Unpaid';
  const orderDate = fmtDate(o.date||o.createdAt);

  // Build timeline
  const steps = [
    { key:'Pending', label:'Order Confirmed', sub: orderDate||'Date recorded' },
    { key:'Processing', label:'In Production', sub: status==='Processing'||step>1 ? (orderDate||'Underway') : 'Awaiting' },
    { key:'Shipped', label:'Shipped', sub: tracking ? `${tracking.courier} · ${tracking.trackingNumber!=='N/A'?'#'+tracking.trackingNumber:'No tracking #'}` : (status==='Shipped'||status==='Complete' ? 'Dispatched' : 'Not yet shipped') },
    { key:'Complete', label:'Delivered', sub: tracking&&tracking.estimatedDelivery ? 'Est. '+fmtDate(tracking.estimatedDelivery) : (status==='Complete' ? 'Delivered' : 'Pending delivery') }
  ];

  let timelineHtml = '';
  steps.forEach((s,i)=>{
    const done = step > i || (step===i && status===s.key);
    const active = step===i && status===s.key;
    const cancelled = status==='Cancelled';
    let iconCls = 'tl-pending', icon = '○';
    if(cancelled && i===0){ iconCls='tl-active'; icon='✕'; }
    else if(done){ iconCls='tl-done'; icon='✓'; }
    else if(active){ iconCls='tl-active'; icon='●'; }
    timelineHtml += `<div class="timeline-item">
      <div class="tl-icon ${iconCls}">${icon}</div>
      <div class="tl-body">
        <div class="tl-label" style="color:${done||active?'#F5F2ED':'#6B7280'}">${s.label}</div>
        <div class="tl-sub">${s.sub}</div>
      </div>
    </div>`;
  });

  // Tracking detail
  let trackDetailHtml = '';
  if(tracking){
    const courierLink = COURIER_LINKS[tracking.courier];
    const tn = tracking.trackingNumber&&tracking.trackingNumber!=='N/A' ? tracking.trackingNumber : null;
    trackDetailHtml = `<div class="track-detail">
      <div class="track-detail-title">Shipping Details</div>
      <div class="track-row"><span>Courier</span><span>${tracking.courier}${courierLink?` <a href="${courierLink}" target="_blank" rel="noopener" class="courier-link">Track on ${tracking.courier} ↗</a>`:''}</span></div>
      ${tn?`<div class="track-row"><span>Tracking #</span><span class="track-number">${tn}</span></div>`:''}
      ${tracking.estimatedDelivery?`<div class="track-row"><span>Est. Delivery</span><span>${fmtDate(tracking.estimatedDelivery)}</span></div>`:''}
      ${tracking.notes?`<div class="track-row"><span>Notes</span><span>${tracking.notes}</span></div>`:''}
    </div>`;
  }

  // Order summary
  let productsHtml = '';
  if(Array.isArray(o.items)&&o.items.length){
    productsHtml = o.items.map(i=>`<div class="product-line">${i.name} · ${i.size||'—'} × ${i.qty}</div>`).join('');
  } else if(product&&product!=='—'){
    productsHtml = `<div class="product-line">${product}</div>`;
  }

  const html = `<div class="result-card">
    <div class="result-header">
      <div>
        <div style="font-size:0.65rem;color:#9CA3AF;margin-bottom:0.2rem;">ORDER</div>
        <div class="result-id">${orderId}</div>
        <div style="font-size:0.78rem;color:#9CA3AF;margin-top:0.2rem;">${client}</div>
      </div>
      <span class="status-badge ${statusBadgeClass(status)}">${status}</span>
    </div>
    <div class="result-body">
      <div class="timeline">${timelineHtml}</div>
      ${trackDetailHtml}
      <div class="order-summary">
        <div class="order-summary-title">Order Summary</div>
        ${productsHtml}
        <div style="display:flex;justify-content:space-between;padding-top:0.5rem;margin-top:0.3rem;border-top:1px solid #1C1A18;font-size:0.82rem;">
          <span style="color:var(--mid);">Total</span>
          <span style="font-weight:700;">${total}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:0.25rem 0;font-size:0.78rem;">
          <span style="color:var(--mid);">Payment</span>
          <span style="color:${payStatus==='Paid'?'#4ade80':'#fbbf24'};font-weight:600;">${payStatus}</span>
        </div>
      </div>
      <a href="https://wa.me/18768851099?text=${encodeURIComponent('Hi! I have a question about my order '+orderId)}" target="_blank" rel="noopener" class="wa-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.129.558 4.122 1.532 5.855L0 24l6.321-1.506A11.93 11.93 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.8 9.8 0 01-5.001-1.368l-.359-.213-3.751.893.924-3.653-.234-.374A9.79 9.79 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
        Questions? WhatsApp Us
      </a>
    </div>
  </div>`;

  const res = document.getElementById('track-result');
  res.style.display='block';
  res.innerHTML=html;
}

async function trackOrder(){
  const val = document.getElementById('track-input').value.trim();
  if(!val){ alert('Please enter an Order ID or WhatsApp number'); return; }
  const btn = document.getElementById('track-btn');
  btn.disabled=true; btn.textContent='Searching…';
  try {
    if(typeof window._trackSearch !== 'function'){
      setTimeout(()=>trackOrder(), 300);
      return;
    }
    const order = await window._trackSearch(val);
    renderResult(order);
  } catch(e){
    document.getElementById('track-result').style.display='block';
    document.getElementById('track-result').innerHTML='<div class="result-card"><div class="not-found"><h3>Search error</h3><p>'+e.message+'</p></div></div>';
  } finally {
    btn.disabled=false; btn.textContent='Track';
  }
}

// Pre-fill from URL query param: ?id=NC-12345
(function(){
  try {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || params.get('order');
    if(id){
      document.getElementById('track-input').value = id;
      window.addEventListener('load', ()=>setTimeout(trackOrder, 600));
    }
  } catch(e){}
})();
</script>
</body>
</html>
